<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" fill="none">
  <defs>
    <!-- Gradient for the B icon -->
    <linearGradient id="logo-grad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00A2E8" />
      <stop offset="50%" stop-color="#0066CC" />
      <stop offset="100%" stop-color="#002D62" />
    </linearGradient>
    
    <!-- Shadow for the Arrow to give it a 3D lift -->
    <filter id="arrow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-1" dy="2" stdDeviation="1.5" flood-color="#001830" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Stylized B Logo Mark -->
  <g transform="translate(5, -2)">
    <!-- Main B Shape: Solid modern stylized B -->
    <path d="M 20 8 C 20 8, 48 8, 58 8 C 72 8, 82 17, 82 30 C 82 38, 76 44, 68 46 C 78 49, 84 57, 84 70 C 84 84, 72 92, 58 92 L 20 92 Z" fill="url(#logo-grad)" />
    
    <!-- White Arrow: Diagonally pointing up-right, cutting the B -->
    <path d="M 12 76 L 26 90 L 52 52 L 57 57 L 62 28 L 33 34 L 39 40 L 16 72 Z" fill="#FFFFFF" filter="url(#arrow-shadow)" />
  </g>

  <!-- Brand Typography -->
  <text x="105" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#002D62" letter-spacing="0.5">BANGGA</text>
  <text x="105" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#002D62" letter-spacing="2">UMKM</text>
</svg>
