<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="100%" height="100%" fill="none">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="0.5" />
    </pattern>
    
    <!-- Chart area gradient -->
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.0" />
    </linearGradient>
    
    <!-- Trust Score gradient -->
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="550" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Sidebar (Left) -->
  <g transform="translate(0, 0)">
    <!-- Sidebar background -->
    <rect width="200" height="550" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    
    <!-- Sidebar Logo / Title -->
    <circle cx="35" cy="40" r="12" fill="#0066CC" />
    <path d="M 31 43 L 39 35 M 39 35 L 35 35 M 39 35 L 39 39" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="56" y="45" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Bangga Dashboard</text>
    
    <!-- Sidebar Navigation Items -->
    <!-- Item 1: Ringkasan (Active) -->
    <rect x="15" y="85" width="170" height="34" rx="8" fill="#eff6ff" />
    <rect x="25" y="97" width="10" height="10" rx="2" fill="#3b82f6" />
    <text x="45" y="107" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#2563eb">Ringkasan</text>
    
    <!-- Item 2: Pencatatan Keuangan -->
    <rect x="25" y="141" width="10" height="10" rx="2" fill="#64748b" />
    <text x="45" y="151" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748b">Catat Transaksi</text>
    
    <!-- Item 3: AI Konsultan -->
    <rect x="25" y="185" width="10" height="10" rx="2" fill="#64748b" />
    <text x="45" y="195" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748b">AI Konsultan</text>
    
    <!-- Item 4: AI Auditor -->
    <rect x="25" y="229" width="10" height="10" rx="2" fill="#64748b" />
    <text x="45" y="239" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748b">AI Auditor</text>
    
    <!-- Item 5: Trust Score -->
    <rect x="25" y="273" width="10" height="10" rx="2" fill="#64748b" />
    <text x="45" y="283" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748b">Trust Score</text>

    <!-- Sidebar Footer / Badge -->
    <rect x="15" y="440" width="170" height="90" rx="12" fill="#f1f5f9" />
    <text x="30" y="465" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Paket Premium</text>
    <text x="30" y="482" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Semua fitur aktif</text>
    <rect x="30" y="498" width="140" height="22" rx="6" fill="#3b82f6" />
    <text x="100" y="513" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Aktif (Rp99k/bln)</text>
  </g>

  <!-- Top Header Bar -->
  <g transform="translate(200, 0)">
    <!-- Header background -->
    <rect width="600" height="65" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    
    <!-- Search Bar -->
    <rect x="25" y="17" width="200" height="30" rx="6" fill="#f1f5f9" />
    <circle cx="40" cy="32" r="5" stroke="#94a3b8" stroke-width="1.5" />
    <line x1="44" y1="36" x2="48" y2="40" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" />
    <text x="56" y="36" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Cari laporan...</text>
    
    <!-- User Profile & Status -->
    <text x="460" y="37" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Kopi Bersama</text>
    <text x="460" y="49" font-family="system-ui, sans-serif" font-size="10" fill="#10b981">Toko Aktif</text>
    <circle cx="545" cy="32" r="16" fill="#3b82f6" />
    <text x="545" y="36" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">KB</text>
  </g>

  <!-- Main Content Area -->
  <g transform="translate(200, 65)">
    <!-- Stats Cards (Top) -->
    <!-- Card 1: Pemasukan -->
    <g transform="translate(25, 20)" filter="url(#cardShadow)">
      <rect width="170" height="80" rx="10" fill="#ffffff" />
      <text x="15" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b">Pemasukan Bulan Ini</text>
      <text x="15" y="50" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Rp12.450.000</text>
      <rect x="15" y="58" width="50" height="14" rx="4" fill="#dcfce7" />
      <text x="40" y="68" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#15803d" text-anchor="middle">+12.4%</text>
    </g>
    
    <!-- Card 2: Pengeluaran -->
    <g transform="translate(210, 20)" filter="url(#cardShadow)">
      <rect width="170" height="80" rx="10" fill="#ffffff" />
      <text x="15" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b">Pengeluaran Bulan Ini</text>
      <text x="15" y="50" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Rp4.800.000</text>
      <rect x="15" y="58" width="50" height="14" rx="4" fill="#fee2e2" />
      <text x="40" y="68" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">-3.2%</text>
    </g>

    <!-- Card 3: Trust Score -->
    <g transform="translate(395, 20)" filter="url(#cardShadow)">
      <rect width="180" height="80" rx="10" fill="#ffffff" />
      <text x="15" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b">UMKM Trust Score</text>
      <text x="15" y="50" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#10b981">87<tspan font-size="12" font-weight="500" fill="#64748b"> /100</tspan></text>
      <rect x="15" y="60" width="100" height="6" rx="3" fill="#e2e8f0" />
      <rect x="15" y="60" width="87" height="6" rx="3" fill="url(#scoreGrad)" />
      <text x="123" y="66" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#10b981">Sangat Baik</text>
    </g>

    <!-- Main Chart Card -->
    <g transform="translate(25, 120)" filter="url(#cardShadow)">
      <rect width="355" height="190" rx="12" fill="#ffffff" />
      <text x="20" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Grafik Perkembangan Laba</text>
      <text x="20" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">6 Bulan Terakhir (Jan - Jun 2026)</text>
      
      <!-- Chart lines & Grid -->
      <line x1="40" y1="140" x2="330" y2="140" stroke="#f1f5f9" stroke-width="1.5" />
      <line x1="40" y1="100" x2="330" y2="100" stroke="#f1f5f9" stroke-width="1.5" />
      <line x1="40" y1="60" x2="330" y2="60" stroke="#f1f5f9" stroke-width="1.5" />
      
      <!-- Graph path (laba bersih) -->
      <path d="M 40 130 Q 90 110, 140 115 T 240 70 T 330 50 L 330 150 L 40 150 Z" fill="url(#chartGrad)" />
      <path d="M 40 130 Q 90 110, 140 115 T 240 70 T 330 50" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" />
      
      <!-- Dots on graph -->
      <circle cx="140" cy="115" r="4" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
      <circle cx="240" cy="70" r="4" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
      <circle cx="330" cy="50" r="4" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
      
      <!-- Chart Labels -->
      <text x="40" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Jan</text>
      <text x="98" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Mar</text>
      <text x="156" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Mei</text>
      <text x="214" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Jul</text>
      <text x="272" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Sep</text>
      <text x="330" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Des</text>
    </g>

    <!-- AI Business Consultant Card -->
    <g transform="translate(395, 120)" filter="url(#cardShadow)">
      <rect width="180" height="190" rx="12" fill="#1e293b" />
      <text x="15" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#38bdf8">AI KONSULTAN</text>
      
      <!-- Chat bubbles -->
      <!-- User message -->
      <rect x="15" y="42" width="150" height="42" rx="8" fill="#334155" />
      <text x="23" y="56" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#cbd5e1">Q: Bagaimana tingkatkan</text>
      <text x="23" y="68" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#cbd5e1">penjualan kopi saya?</text>
      
      <!-- AI Answer -->
      <rect x="15" y="94" width="150" height="78" rx="8" fill="#0f172a" stroke="#0284c7" stroke-width="1" />
      <text x="23" y="108" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#38bdf8">AI Consultant:</text>
      <text x="23" y="122" font-family="system-ui, sans-serif" font-size="9" fill="#f1f5f9">1. Berikan promo bundle</text>
      <text x="23" y="134" font-family="system-ui, sans-serif" font-size="9" fill="#f1f5f9">   kopi &amp; roti di pagi hari.</text>
      <text x="23" y="146" font-family="system-ui, sans-serif" font-size="9" fill="#f1f5f9">2. Buat program loyalitas.</text>
    </g>

    <!-- Recent Transactions & Auditor AI (Bottom Row) -->
    <!-- Card: Recent Transactions -->
    <g transform="translate(25, 330)" filter="url(#cardShadow)">
      <rect width="355" height="135" rx="12" fill="#ffffff" />
      <text x="20" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Transaksi Terakhir</text>
      
      <!-- Trans 1 -->
      <circle cx="35" cy="55" r="10" fill="#dcfce7" />
      <path d="M 32 55 L 35 52 M 35 52 L 38 55 M 35 52 L 35 58" stroke="#15803d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      <text x="55" y="54" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0f172a">Penjualan 12 Kopi Susu</text>
      <text x="55" y="66" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">26 Jun 2026 • 19:42</text>
      <text x="335" y="58" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#15803d" text-anchor="end">+Rp216.000</text>
      
      <line x1="20" y1="78" x2="335" y2="78" stroke="#f1f5f9" stroke-width="1" />
      
      <!-- Trans 2 -->
      <circle cx="35" cy="98" r="10" fill="#fee2e2" />
      <path d="M 32 98 L 38 98 M 35 95 L 35 101" stroke="#b91c1c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(45 35 98)" />
      <text x="55" y="97" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0f172a">Beli Biji Kopi Arabika</text>
      <text x="55" y="109" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">26 Jun 2026 • 15:30</text>
      <text x="335" y="101" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="end">-Rp350.000</text>
    </g>

    <!-- Card: AI Financial Auditor -->
    <g transform="translate(395, 330)" filter="url(#cardShadow)">
      <rect width="180" height="135" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
      <text x="15" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0f172a">AI FINANCIAL AUDITOR</text>
      
      <!-- Alert icon -->
      <rect x="15" y="42" width="150" height="80" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" />
      <circle cx="30" cy="58" r="7" fill="#f59e0b" />
      <text x="30" y="61" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#ffffff" text-anchor="middle">!</text>
      <text x="44" y="58" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#b45309">Analisis Margin</text>
      
      <text x="23" y="80" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Pengeluaran biji kopi naik 15%.</text>
      <text x="23" y="92" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Laba kotor turun 2% bulan ini.</text>
      <text x="23" y="108" font-family="system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#d97706">Saran: Kurangi porsi sisa biji.</text>
    </g>
  </g>
</svg>
